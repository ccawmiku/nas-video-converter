name: Test, build and publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest --cov=app --cov-report=term-missing
      - name: Verify no media deletion call exists
        run: python -m pytest tests/test_safety.py::test_application_has_no_media_delete_calls

  container-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: nas-video-converter:smoke
      - name: Verify Intel QSV encoder is packaged
        run: docker run --rm --entrypoint sh nas-video-converter:smoke -c 'ffmpeg -hide_banner -encoders 2>/dev/null | grep -q h264_qsv'
      - name: Real container smoke test
        shell: bash
        run: |
          set -euo pipefail
          MEDIA="$RUNNER_TEMP/media/测试 视频库/电影/深层 [目录]"
          CONFIG="$RUNNER_TEMP/config"
          mkdir -p "$MEDIA" "$CONFIG"
          chmod -R 0777 "$CONFIG" "$RUNNER_TEMP/media"
          docker run --entrypoint ffmpeg -v "$RUNNER_TEMP/media:/work:rw" nas-video-converter:smoke -v error -f lavfi -i testsrc2=size=160x90:rate=12 -f lavfi -i sine=frequency=440 -t 2 -c:v libx264 -c:a aac "/work/测试 视频库/电影/深层 [目录]/remux 源.mkv"
          docker run --entrypoint ffmpeg -v "$RUNNER_TEMP/media:/work:rw" nas-video-converter:smoke -v error -f lavfi -i testsrc2=size=160x90:rate=12 -t 2 -c:v mpeg2video "/work/测试 视频库/电影/深层 [目录]/transcode 源.avi"
          docker run --entrypoint ffmpeg -v "$RUNNER_TEMP/media:/work:rw" nas-video-converter:smoke -v error -f lavfi -i testsrc2=size=160x90:rate=12 -t 2 -c:v libx264 "/work/测试 视频库/电影/深层 [目录]/already.mp4"
          touch "$CONFIG/nas-video-converter.db"
          chmod 0600 "$CONFIG/nas-video-converter.db"
          docker run -d --name nvc-smoke -p 12012:12012 -e PUID=1026 -e PGID=100 -v "$RUNNER_TEMP/media:/media:rw" -v "$CONFIG:/config" nas-video-converter:smoke
          for i in {1..60}; do curl -fsS http://127.0.0.1:12012/health && break; sleep 1; done
          test "$(docker top nvc-smoke -eo uid,gid,pid,comm | awk '$4 == "uvicorn" {print $1 ":" $2}')" = "1026:100"
          ROOT='/media/测试 视频库'
          SCAN=$(curl -fsS -X POST http://127.0.0.1:12012/api/scans -H 'Content-Type: application/json' --data "{\"root\":\"$ROOT\"}" | jq -r .job_id)
          wait_job() { for i in {1..120}; do STATE=$(curl -fsS "http://127.0.0.1:12012/api/jobs/$1" | jq -r .state); case "$STATE" in completed) return 0;; failed|cancelled|interrupted) curl -fsS "http://127.0.0.1:12012/api/jobs/$1"; return 1;; esac; sleep 1; done; return 1; }
          wait_job "$SCAN"
          STATS=$(curl -fsS "http://127.0.0.1:12012/api/stats?root=$(printf %s "$ROOT" | jq -sRr @uri)")
          test "$(jq -r .categories.remux.count <<<"$STATS")" -eq 1
          test "$(jq -r .categories.transcode.count <<<"$STATS")" -eq 1
          test "$(jq -r .categories.no_conversion.count <<<"$STATS")" -eq 1
          FILES=$(curl -fsS "http://127.0.0.1:12012/api/files?root=$(printf %s "$ROOT" | jq -sRr @uri)&page_size=100")
          REMUX_ID=$(jq -r '.items[]|select(.category=="remux")|.id' <<<"$FILES")
          TRANSCODE_ID=$(jq -r '.items[]|select(.category=="transcode")|.id' <<<"$FILES")
          MP4_ID=$(jq -r '.items[]|select(.category=="no_conversion")|.id' <<<"$FILES")
          printf 'preexisting' > "$MEDIA/remux 源.mp4"
          PLAN=$(curl -fsS -X POST http://127.0.0.1:12012/api/plans -H 'Content-Type: application/json' --data "{\"root\":\"$ROOT\",\"actions\":[{\"file_id\":$REMUX_ID,\"action\":\"remux\"},{\"file_id\":$TRANSCODE_ID,\"action\":\"transcode\"}]}" | jq -r .plan_id)
          CONVERT=$(curl -fsS -X POST http://127.0.0.1:12012/api/conversions -H 'Content-Type: application/json' --data "{\"plan_id\":\"$PLAN\",\"profile\":\"recommended\"}" | jq -r .job_id)
          wait_job "$CONVERT"
          VERIFY=$(curl -fsS -X POST http://127.0.0.1:12012/api/verifications -H 'Content-Type: application/json' --data "{\"file_id\":$MP4_ID,\"full\":true}" | jq -r .job_id)
          wait_job "$VERIFY"
          test "$(cat "$MEDIA/remux 源.mp4")" = preexisting
          test -f "$MEDIA/remux 源 (2).mp4"
          test -f "$MEDIA/transcode 源.mp4"
          test -f "$RUNNER_TEMP/media/测试 视频库/转换前原文件/电影/深层 [目录]/remux 源.mkv"
          test -f "$RUNNER_TEMP/media/测试 视频库/转换前原文件/电影/深层 [目录]/transcode 源.avi"
          docker run --entrypoint ffprobe -v "$RUNNER_TEMP/media:/work:ro" nas-video-converter:smoke -v error -show_format -show_streams "/work/测试 视频库/电影/深层 [目录]/remux 源 (2).mp4" >/dev/null
          test "$(docker run --entrypoint ffprobe -v "$RUNNER_TEMP/media:/work:ro" nas-video-converter:smoke -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 "/work/测试 视频库/电影/深层 [目录]/transcode 源.mp4")" = h264
          docker run --entrypoint ffmpeg -v "$RUNNER_TEMP/media:/work:ro" nas-video-converter:smoke -v error -i "/work/测试 视频库/电影/深层 [目录]/transcode 源.mp4" -frames:v 3 -f null -

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: container-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push public amd64 image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ccawmiku/nas-video-converter:${{ steps.version.outputs.value }}
      - name: Verify anonymous pull
        run: |
          docker logout ghcr.io
          docker pull ghcr.io/ccawmiku/nas-video-converter:${{ steps.version.outputs.value }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "NAS Video Converter $GITHUB_REF_NAME"
      - name: Image digest
        run: echo "ghcr.io/ccawmiku/nas-video-converter@${{ steps.image.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
