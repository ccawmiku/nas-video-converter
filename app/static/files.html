<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>文件与处理计划 · NAS 视频转换器</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div><p class="eyebrow">NAS VIDEO CONVERTER</p><h1>文件与处理计划</h1></div>
    <div class="topbar-actions"><a class="back-link" href="/">返回处理台</a><div class="trust"><span></span><b id="versionBadge">版本读取中</b></div></div>
  </header>
  <main>
    <section class="toolbar panel">
      <label>映射目录<select id="rootSelect"></select></label>
      <button id="refreshBtn">刷新列表</button>
    </section>
    <section class="panel">
      <div class="section-title"><div><p class="eyebrow">SCAN PLAN</p><h2>扫描结果</h2></div><div class="filters"><input id="search" placeholder="搜索路径"><select id="category"><option value="">全部分类</option><option value="no_conversion">无需转换</option><option value="remux">可无损换封装</option><option value="transcode">需要重新编码</option><option value="unsupported">无法处理</option><option value="skipped">跳过</option></select></div></div>
      <div class="batchbar"><label><input type="checkbox" id="selectAll"> 全选当前可处理项</label><span id="selectedCount">已选 0 项</span><select id="profile"><option value="quality">高质量（16）</option><option selected value="recommended">推荐（18）</option><option value="space">节省空间（20）</option></select><button id="confirmBtn" class="primary" disabled>确认计划</button><button id="runBtn" class="primary" disabled>正式运行</button></div>
      <div class="table-wrap"><table><thead><tr><th></th><th>相对路径</th><th>分类</th><th>技术信息</th><th>完整性</th><th>大小</th><th>原因 / 操作</th></tr></thead><tbody id="fileRows"></tbody></table></div>
      <div class="pagination"><button id="previousPage">上一页</button><span id="pageInfo">第 1 页</span><button id="nextPage">下一页</button></div>
    </section>
  </main>
  <div id="toast"></div>
  <script src="/static/files.js" defer></script>
</body>
</html>
